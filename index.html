<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compagnon Icons</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;

  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* CONTENU */
.content {
  flex: 1;
}

/* Header */
.header {
  padding: 20px 30px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
  text-align: center;
}

.header p {
  margin-top: 5px;
  opacity: 0.6;
  text-align: center;
}

/* Recherche */
.search {
  margin: 20px 30px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 15px;
  padding: 20px 30px;
}

/* Card */
.card {
  background: white;
  border-radius: 12px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #334155;
}

/* Image */
.card img {
  width: 28px;
  height: 28px;
}

/* Popup */
.popup {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  padding: 8px 16px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.2s;
}

.popup.show {
  opacity: 1;
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  opacity: 0.6;
  border-top: 1px solid #222;
}
</style>

</head>

<body>

<div class="content">

  <div class="header">
    <h1>CompagnonIcons</h1>
    <p>Des icônes simples et efficaces</p>
  </div>

  <div class="search">
    <input placeholder="Rechercher une icône...">
  </div>

  <div class="grid" id="grid"></div>

</div>

<footer>
  © 2026 - Compagnon | Icônes provenant de Mingcute
</footer>

<div id="popup" class="popup">Copié !</div>

<script>
const icons = [
"accueil",
"add_square_fill",
"alert_fill",
"alert_line",
"align_left_line",
"bling_fill",
"calendar_2_fill",
"calendrier",
"cellphone_fill",
"chart_pie_2_fill",
"chartpie",
"check_circle_fill",
"check_circle_line",
"checkbox_fill",
"checkbox_line",
"delete_2_fill",
"edit_2_fill",
"flash_line",
"fullscreen_2_line",
"grid_2_fill",
"group_2_fill",
"mail_fill",
"palette_fill",
"profile",
"qrcode_fill",
"rss_line",
"safe_alert_fill",
"safety_certificate_fill",
"schedule_fill",
"settings_2_fill",
"sitemap_fill",
"terminal_box_fill",
"upload_3_fill",
"user_2_fill",
"user_info_fill",
"user_lock_fill",
"user_pin_fill",
"user_question_fill"
];

const grid = document.getElementById("grid");

icons.forEach(name => {
  const card = document.createElement("div");
  card.className = "card";
  card.onclick = () => copy(name);

  const img = document.createElement("img");
  img.src = `https://raw.githubusercontent.com/AppCompagnon/CompagnonIcons/main/images/${name}.png`;

  card.appendChild(img);
  grid.appendChild(card);
});

function copy(name) {
  navigator.clipboard.writeText(name);

  const popup = document.getElementById("popup");
  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
  }, 1000);
}
</script>

</body>
</html>
