<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CompagnonIcons</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  background: linear-gradient(135deg, #4f46e5, #9333ea);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}

/* Titre */
h1 {
  font-size: 3em;
  margin-bottom: 40px;
  padding: 15px 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

/* Grid */
.grid {
  display: flex;
  gap: 30px;
}

/* Carrés */
.card {
  width: 140px;
  height: 140px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: scale(1.1);
}

/* Images */
.card img {
  width: 70%;
  height: 70%;
  object-fit: contain;
}

/* Popup */
.popup {
  position: fixed;
  bottom: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.popup.show {
  opacity: 1;
}
</style>

</head>

<body>

<h1>Compagnon</h1>

<div class="grid">

  <div class="card" onclick="copyText('images/note.png')">
    <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
  </div>

  <div class="card" onclick="copyText('images/user.png')">
    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
  </div>

  <div class="card" onclick="copyText('images/settings.png')">
    <img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png">
  </div>

</div>

<div id="popup" class="popup">Copié !</div>

<script>
function copyText(text) {
  navigator.clipboard.writeText(text);

  const popup = document.getElementById("popup");
  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
  }, 1200);
}
</script>

</body>
</html>
