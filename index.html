<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compagnon Icons</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: white;
}

/* Header simple */
.header {
  padding: 20px 30px
  color: black;
}

.header h1 {
  margin: 0;
  font-size: 28px;
  align-items: center;
  color: black;
}

.header p {
  margin-top: 5px;
  opacity: 0.6;
}

/* Barre recherche */
.search {
  margin: 20px 30px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

/* Grid icônes */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 15px;
  padding: 20px 30px;
}

/* Carte icône */
.card {
  background: white;
  border-radius: 12px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #334155;
}

/* Image */
.card img {
  width: 28px;
  height: 28px;
}

/* Popup */
.popup {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  padding: 8px 16px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.2s;
}

.popup.show {
  opacity: 1;
}
</style>

</head>

<body>

<div class="header">
  <h1>CompagnonIcons</h1>
  <p>Des icônes simples et efficaces</p>
</div>

<div class="search">
  <input placeholder="Rechercher une icône...">
</div>

<div class="grid">

  <div class="card" onclick="copy('add-square-fill')">
    <img src="https://github.com/AppCompagnon/CompagnonIcons/blob/main/images/add_square_fill.png?raw=true">
  </div>

  <div class="card" onclick="copy('alert-fill')">
    <img src="https://github.com/AppCompagnon/CompagnonIcons/blob/main/images/alert_fill.png?raw=true">
  </div>

  <div class="card" onclick="copy('alert-unfill')">
    <img src="https://github.com/AppCompagnon/CompagnonIcons/blob/main/images/alert_line.png?raw=true">
  </div>

</div>

<div id="popup" class="popup">Copié !</div>

<script>
function copy(name) {
  navigator.clipboard.writeText(name);

  const popup = document.getElementById("popup");
  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
  }, 1000);
}
</script>

</body>
</html>
